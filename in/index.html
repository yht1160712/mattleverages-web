<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Follow Matt | Capital Growth & Wealth Freedom in India</title>
    <style>
        :root { --bg: #000000; --text: #f0f0f0; --primary: #f1c40f; --accent: #ff9933; --card-bg: #0a0a0a; --border: #1a1a1a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Times New Roman', Times, serif; background-color: var(--bg); color: var(--text); line-height: 1.8; overflow-x: hidden; }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 40px; }
        
        /* Header */
        header { padding: 40px 0; text-align: center; border-bottom: 1px solid var(--border); }
        .logo { font-size: 2rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--primary); font-family: -apple-system, sans-serif; }
        
        /* Hero Section */
        .hero { padding: 100px 0 60px; text-align: center; }
        .hero h1 { font-size: 4rem; font-weight: 700; letter-spacing: -2px; line-height: 1.1; margin-bottom: 25px; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .hero p { font-size: 1.6rem; color: #aaa; max-width: 700px; margin: 0 auto 50px; font-style: italic; }
        .badge { display: inline-block; padding: 8px 16px; border: 1px solid var(--accent); color: var(--accent); border-radius: 4px; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; font-family: -apple-system, sans-serif; }
        .cta-btn { display: inline-block; padding: 18px 40px; background-color: var(--primary); color: #000; text-decoration: none; border-radius: 4px; font-weight: 700; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s ease; font-family: -apple-system, sans-serif; }
        .cta-btn:hover { background-color: #fff; box-shadow: 0 0 30px rgba(255,255,255,0.5); }

        /* Follow Matt Section */
        .matt-focus { padding: 60px 0 100px; text-align: center; border-top: 1px solid var(--border); }
        .matt-focus h2 { font-size: 2.2rem; color: #fff; margin-bottom: 30px; letter-spacing: -1px; }
        .matt-focus .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
